name: Publish MyWallpaper release through admission-v1

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  release:
    if: github.event.repository.private == false
    concurrency:
      group: mywallpaper-release-${{ github.repository_id }}-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      actions: read
      artifact-metadata: write
      attestations: write
      contents: write
      id-token: write
    uses: MyWallpapers/native-addon-toolchain/.github/workflows/native-addon-build.yml@7034cb194d4366ccfd6eaf8d20e60baf845dc818
    with:
      channel: development
